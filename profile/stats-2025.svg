<svg xmlns="http://www.w3.org/2000/svg" width="380" height="160" viewBox="0 0 380 160" role="img" aria-labelledby="title desc">
  <title id="title">GitHub Stats 2025</title>
  <desc id="desc">Yearly GitHub profile summary card for 2025.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#171225"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f472b6"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="380" height="160" rx="16" fill="url(#bg)"/>
  <rect x="18" y="16" width="344" height="128" rx="12" fill="#0b1020" opacity="0.68"/>
  <rect x="18" y="16" width="344" height="4" rx="2" fill="url(#accent)"/>

  <text x="34" y="48" fill="#f472b6" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">GitHub Stats 2025</text>
  <text x="34" y="72" fill="#cbd5e1" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12">Yearly profile snapshot</text>

  <g fill="#e2e8f0" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13">
    <text x="34" y="98">568 contributions</text>
    <text x="34" y="118">36 following</text>
    <text x="34" y="138">34 followers • 0 public gists</text>
  </g>

  <circle cx="308" cy="86" r="40" fill="#a855f7" opacity="0.18"/>
  <circle cx="308" cy="86" r="24" fill="#f472b6" opacity="0.25"/>
  <path d="M286 94c9-20 16-21 24-4 4 8 7 12 12 12 8 0 11-18 22-38" fill="none" stroke="#c084fc" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="308" y="90" fill="#ffffff" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" text-anchor="middle">2025</text>
</svg>
