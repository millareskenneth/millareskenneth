name: Music

on:
  schedule:
    - cron: "0 11 * * *"
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  github-music:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Generate Music
        uses: lowlighter/metrics@latest

        with:
          token: NOT_NEEDED

          template: classic
          base: ""
          filename: github-music.svg
          output_action: commit

          plugin_music: yes
          plugin_music_playlist: https://open.spotify.com/embed/playlist/10kIARqeR4FajImx4o0MBo
          plugin_music_limit: 2