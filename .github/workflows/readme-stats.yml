name: Generate README stats cards

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  generate-stats:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate 2026 stats card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: username=${{ github.repository_owner }}&show_icons=true&commits_year=2026&theme=radical
          path: profile/stats-2026.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate 2025 stats card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: username=${{ github.repository_owner }}&show_icons=true&commits_year=2025&theme=radical
          path: profile/stats-2025.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit updated stats cards
        run: |
          if git diff --quiet -- profile/stats-2026.svg profile/stats-2025.svg; then
            echo "No stats changes to commit"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/stats-2026.svg profile/stats-2025.svg
          git commit -m "chore: update README stats cards [skip ci]"
          git push