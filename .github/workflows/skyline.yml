name: Skyline

on:
  schedule:
    - cron: "0 6 * * *"
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  github-skyline:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Generate Skyline
        uses: lowlighter/metrics@latest

        with:
          token: NOT_NEEDED

          template: classic
          base: ""
          filename: github-skyline.svg
          output_action: commit

          plugin_skyline: yes
          plugin_skyline_frames: 6
          plugin_skyline_quality: 1
