name: Isocalendar

on:
  schedule:
    - cron: "0 7 * * *"
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  github-isocalendar:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Generate Half-year Calendar
        uses: lowlighter/metrics@latest

        with:
          token: ${{ secrets.METRICS_TOKEN }}

          template: classic
          base: ""
          filename: github-isocalendar.svg
          output_action: commit

          plugin_isocalendar: yes
